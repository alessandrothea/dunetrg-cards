
pipeline_name: "vd_muminus_tomoz_1x8x14"
# TODO: add first event parameter
first_event: 
  run: 1234000
  subrun: 1
  event: 1
n_events: 100
skip_events : 0
keep_last_hist_file: True
keep_last_art_file: True

stages:
  gen : "gen_vd_1x8x14_muminus_tomoz.fcl"
  g4 : "supernova_g4_dunevd10kt_1x8x14_3view_30deg.fcl"

  detsim_pds: "detsim_dunevd10kt_1x8x14_3view_30deg_pds_only.fcl"
  detsim_tpc:
    template: "detsim_dunevd10kt_1x8x14_3view_30deg_tpc_only_template.fcl"
    n_iter: 112
    delete_intermediate_products: True
  detsim_drop_empty: "rawdigits_cleaner.fcl"

  tpg : "triggersim_tpg_vd_1x8x14.fcl"
  anatree : "triggerana_vd_1x8x14_simpleThr.fcl"

sequence:
  - "gen"
  - "g4"
  - "detsim_pds"
  - "detsim_tpc"
  # - "detsim_drop_empty"
  - "tpg"
  - "anatree"
