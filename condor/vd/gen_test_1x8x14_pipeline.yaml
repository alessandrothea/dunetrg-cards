---
# piper-condor.py job card — full generation pipeline (generator source)
# Runs lar-piper.py with vd_single_eminus_1x8x14.yaml as a batch HTCondor job.
# n_jobs = n_events // n_events_per_job; each job gets a unique run:subrun label.
#
# Usage (dry-run):
#   piper-condor.py run/eminus_1x8x14_pipeline.yaml
# Usage (submit):
#   piper-condor.py -s run/eminus_1x8x14_pipeline.yaml

label: 'gentest_1x8x14_pipeline'

pipeline_config: '${HOME}/work/dune/toolbox/dunetrg-cards/pipelines/vd_gen_test_1x8x14.yaml'

setup_script: '${HOME}/work/dune/trigsim_v10_20_03d00/condor_setup.sh'

eos_output_folder: '/eos/home-t/thea/dune_trigger/eminus_1x8x14'
copy_to_eos:
  - "gen"


source:
  type: generator
  n_events: 10           # total events for the campaign
  n_events_per_job: 5    # n_jobs = n_events // n_events_per_job = 10
  run_number: 1234       # ART run number; each job gets subrun = job_index, event = 1
